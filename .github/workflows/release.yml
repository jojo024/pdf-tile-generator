name: Release builds

# Builds the Windows Velopack installer (self-updating) plus macOS/Linux
# archives when a version tag (v*) is pushed, and publishes them as a GitHub
# release.
#
# Flow: create-draft -> {windows, macos, linux} build & upload -> publish.
# The release is kept as a DRAFT while building so that `vpk download github`
# in the Windows job sees the PREVIOUS published release as "latest" and can
# generate a delta against it. The publish job flips the draft to public last.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}  # manual rebuild: run against a tag ref

permissions:
  contents: write

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists; leaving as-is."
          else
            gh release create "$tag" -R "$GITHUB_REPOSITORY" --draft \
              --title "PDF Tile Generator ${tag#v}" \
              --notes "Automated release ${tag}. See CHANGELOG.md for details."
          fi

  windows:
    needs: create-draft
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .[dev]

      - name: Test
        run: python -m pytest tests

      - name: Build with PyInstaller
        run: pyinstaller pdf_tile_generator.spec --noconfirm

      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk

      - name: Download previous release for delta base
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # Best-effort: the first Velopack release has no prior package to
          # delta from, so a failure here is expected and non-fatal.
          vpk download github \
            --repoUrl "https://github.com/${GITHUB_REPOSITORY}" \
            --token "$GH_TOKEN" || echo "No previous Velopack release; building full only."

      - name: Pack Velopack release
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          vpk pack \
            --packId PdfTileGenerator \
            --packVersion "$ver" \
            --packDir dist/PDFTileGenerator \
            --mainExe PDFTileGenerator.exe \
            --packTitle "PDF Tile Generator" \
            --packAuthors "jojo024"

      - name: Upload Windows assets to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # Uploads Setup.exe, Portable.zip, the .nupkg, and the feed files
          # (RELEASES / releases.win.json / assets.win.json) the updater reads.
          gh release upload "${GITHUB_REF_NAME}" Releases/* -R "$GITHUB_REPOSITORY" --clobber

  unix:
    needs: create-draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: PDFTileGenerator-macos-arm64.zip
          - os: ubuntu-latest
            asset: PDFTileGenerator-linux-x64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libgl1 libegl1

      - name: Install
        run: pip install -e .[dev]

      - name: Test
        run: python -m pytest tests

      - name: Build with PyInstaller
        run: pyinstaller pdf_tile_generator.spec --noconfirm

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/PDF Tile Generator.app" "${{ matrix.asset }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.asset }} -C dist PDFTileGenerator

      - name: Attach to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" "${{ matrix.asset }}" -R "$GITHUB_REPOSITORY" --clobber

  publish:
    needs: [windows, unix]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" -R "$GITHUB_REPOSITORY" \
            --draft=false --latest
