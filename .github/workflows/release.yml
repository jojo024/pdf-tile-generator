name: Release builds

# Builds standalone executables for Windows, macOS, and Linux when a version
# tag (v*) is pushed, and attaches them to the GitHub release for that tag.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: PDFTileGenerator-windows-x64.zip
          - os: macos-latest
            asset: PDFTileGenerator-macos-arm64.zip
          - os: ubuntu-latest
            asset: PDFTileGenerator-linux-x64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libgl1 libegl1

      - name: Install
        run: pip install -e .[dev]

      - name: Test
        run: python -m pytest tests

      - name: Build with PyInstaller
        run: pyinstaller pdf_tile_generator.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\PDFTileGenerator -DestinationPath ${{ matrix.asset }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/PDF Tile Generator.app" "${{ matrix.asset }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ${{ matrix.asset }} -C dist PDFTileGenerator

      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" "${{ matrix.asset }}" --clobber
